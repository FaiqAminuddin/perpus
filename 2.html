<html lang="id">
<head>
    <meta charset="UTF-8">

    <style>
        /* RESET & DASAR */
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #f4f6f9;
    margin: 0;
    padding: 20px;
    color: #333;
}

/* CARD UTAMA */
.book-card {
    max-width: 800px;
    margin: 40px auto;
    display: flex;
    gap: 30px;
    background: #fff;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    align-items: flex-start;
}

/* BAGIAN KIRI (GAMBAR & AKSI) */
.book-image {
    flex: 0 0 180px; /* Ukuran tetap untuk area gambar */
    display: flex;
    flex-direction: column;
    align-items: center;
}

#cover {
    width: 100%;
    max-width: 180px;
    border-radius: 10px;
    object-fit: cover;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    transition: transform 0.3s ease;
}

#cover:hover {
    transform: scale(1.03);
}

/* Placeholder jika tidak ada cover */
#noCover {
    width: 150px;
    height: 220px;
    font-size: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #e9ecef;
    border-radius: 10px;
    color: #adb5bd;
}

/* BAGIAN KANAN (TEKS) */
.book-info {
    flex: 1;
}

.book-info h2 {
    margin: 0 0 10px 0;
    font-size: 24px;
    line-height: 1.2;
}

.book-info h4 {
    margin: 0 0 20px 0;
    color: #6c757d;
    font-weight: 500;
}

.book-info p {
    margin: 8px 0;
    font-size: 14px;
    border-bottom: 1px dashed #eee;
    padding-bottom: 5px;
}

.book-info p strong {
    color: #555;
    width: 100px;
    display: inline-block;
}

/* TOMBOL */
.book-actions {
    margin-top: 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}

.btn {
    padding: 8px 16px;
    border-radius: 6px;
    text-decoration: none;
    font-weight: 600;
    font-size: 13px;
    transition: all 0.2s;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
}

.read { background: #3498db; color: white; }
.read:hover { background: #2980b9; }

.download { background: #2ecc71; color: white; }
.download:hover { background: #27ae60; }

.nav { background: #343a40; color: white; }
.nav:hover { background: #23272b; }

.btn:disabled {
    background: #dee2e6 !important;
    color: #adb5bd;
    cursor: not-allowed;
    transform: none;
}

/* RESPONSIVE */
@media (max-width: 650px) {
    .book-card {
        flex-direction: column;
        align-items: center;
        text-align: center;
        padding: 20px;
    }
    
    .book-info p strong {
        display: block;
        width: 100%;
        margin-bottom: 2px;
    }

    .book-actions {
        justify-content: center;
    }
}
    </style>
</head>
<body>

<div class="book-card">
    <div class="book-image">
        <img id="cover" src="" alt="Sampul Buku" style="display:none;">
        <div id="noCover">📚</div>
        <div class="book-actions">
            <a id="btnBaca" target="_blank" class="btn read">📖 Baca</a>
            <a id="btnUnduh" class="btn download">⬇️ Unduh</a>
        </div>
    </div>

    <div class="book-info">
        <h2 id="judul">Memuat...</h2>
        <h4 id="penulis"></h4>
        <p><strong>Penerbit:</strong> <span id="penerbit"></span></p>
        <p><strong>Kota:</strong> <span id="kota"></span></p>
        <p><strong>Tahun:</strong> <span id="tahun"></span></p>
        <p><strong>ISBN:</strong> <span id="isbn"></span></p>
        <p><strong>Kategori:</strong> <span id="kategori"></span></p>

        <div class="book-actions">
            <button id="btnPrev" class="btn nav">⬅️ Sebelumnya</button>
            <button id="btnNext" class="btn nav">➡️ Buku Lainnya</button>

    </div>

    // 2. Deklarasi dataRows cukup sekali saja
    let dataRows = csvContent.trim().split("\n");
    let currentIndex = 1; 

    const btnNext = document.getElementById("btnNext");
    const btnPrev = document.getElementById("btnPrev");

    if (dataRows.length < 2) {
        console.error("Data kosong");
        return;
    }

    function parseCSV(row) {
        // Regex untuk menangani kolom yang mengandung koma di dalam tanda kutip
        const matches = row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);
        return matches ? matches.map(item => item.replace(/^"|"$/g, '')) : [];
    }

    function tampilkanData(index) {
        const cols = parseCSV(dataRows[index]);
        if (!cols || cols.length === 0) return;

        document.getElementById("judul").innerText = cols[0] || "";
        document.getElementById("penulis").innerText = cols[1] || "";
        document.getElementById("penerbit").innerText = cols[2] || "";
        document.getElementById("kota").innerText = cols[3] || "";
        document.getElementById("tahun").innerText = cols[4] || "";
        document.getElementById("isbn").innerText = cols[5] || "";
        document.getElementById("kategori").innerText = cols[8] || "";

        const cover = document.getElementById("cover");
        const noCover = document.getElementById("noCover");

        // Perbaikan logika deteksi cover (menangani tanda "" atau kosong)
        if (!cols[6] || cols[6].trim() === "" || cols[6] === "") {
            cover.style.display = "none";
            noCover.style.display = "flex";
        } else {
            cover.style.display = "block";
            noCover.style.display = "none";
            cover.src = cols[6];
        }
        document.getElementById("btnBaca").href = cols[7] || "#";
        document.getElementById("btnUnduh").href = cols[7] || "#";
        
        updateButtonState();
    }

    function updateButtonState() {
        btnPrev.disabled = (currentIndex <= 1);
        btnNext.disabled = (currentIndex >= dataRows.length - 1);
    }

    btnNext.addEventListener("click", () => {
        if (currentIndex < dataRows.length - 1) {
            currentIndex++;
            tampilkanData(currentIndex);
        }
    });

    btnPrev.addEventListener("click", () => {
        if (currentIndex > 1) {
            currentIndex--;
            tampilkanData(currentIndex);
        }
    });

    // Jalankan pertama kali
    tampilkanData(currentIndex);
});
